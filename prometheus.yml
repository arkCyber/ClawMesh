# Prometheus Configuration for ClawMesh Monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'clawmesh-production'
    replica: '1'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Scrape configurations
scrape_configs:
  # ClawMesh application metrics
  - job_name: 'clawmesh'
    static_configs:
      - targets: ['clawmesh:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # PostgreSQL metrics (requires postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: []
        # - postgres-exporter:9187

  # Redis metrics (requires redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: []
        # - redis-exporter:9121

  # Node metrics (requires node_exporter)
  - job_name: 'node'
    static_configs:
      - targets: []
        # - node-exporter:9100

# Recording rules for aggregations
rule_files:
  # - "rules/*.yml"
