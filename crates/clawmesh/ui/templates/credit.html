<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - ClawMeet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: white;
            font-size: 1.8rem;
        }
        
        .nav-link {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            transition: background 0.3s;
        }
        
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
        }
        
        .credit-display {
            text-align: center;
            padding: 3rem;
        }
        
        .credit-score {
            font-size: 5rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 1rem;
        }
        
        .credit-tier {
            font-size: 2rem;
            color: #764ba2;
            margin-bottom: 2rem;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            margin: 2rem 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .info-item {
            text-align: center;
            padding: 1.5rem;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .info-label {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .info-value {
            color: #333;
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .api-section {
            margin-top: 2rem;
        }
        
        .api-section h3 {
            color: #333;
            margin-bottom: 1rem;
        }
        
        .api-endpoint {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-family: 'Courier New', monospace;
        }
        
        .method {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-weight: 600;
            margin-right: 1rem;
        }
        
        .method-get {
            background: #28a745;
            color: white;
        }
        
        .method-post {
            background: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⭐ {{ title }}</h1>
        <a href="/clawmeet" class="nav-link">← 返回首页</a>
    </div>
    
    <div class="container">
        <div class="card">
            <div class="credit-display">
                <div class="credit-score">{{ user_credit }}</div>
                <div class="credit-tier">{{ user_tier }}</div>
                
                <div class="progress-bar">
                    <div class="progress-fill" style="width: {{ user_credit / 10 }}%"></div>
                </div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">下一等级</div>
                        <div class="info-value">Active</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">还需信用</div>
                        <div class="info-value">100</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">当前排名</div>
                        <div class="info-value">Top 20%</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card api-section">
            <h3>📡 API 端点</h3>
            
            <div class="api-endpoint">
                <span class="method method-get">GET</span>
                <span>/api/v3/credit/person/{person_id}</span>
            </div>
            
            <div class="api-endpoint">
                <span class="method method-post">POST</span>
                <span>/api/v3/credit/update</span>
            </div>
            
            <div class="api-endpoint">
                <span class="method method-get">GET</span>
                <span>/api/v3/credit/stats/global</span>
            </div>
            
            <div class="api-endpoint">
                <span class="method method-get">GET</span>
                <span>/api/v3/credit/permissions/{person_id}</span>
            </div>
        </div>
    </div>
</body>
</html>
